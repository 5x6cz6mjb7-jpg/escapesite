<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Classified Transmission</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at center, #250000 0%, #050000 55%, #000 100%);
      color: #ff4444;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,0,0,0.06),
          rgba(255,0,0,0.06) 1px,
          transparent 1px,
          transparent 4px
        );
      animation: scanMove 6s linear infinite;
    }

    @keyframes scanMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    .screen {
      width: 100%;
      max-width: 1200px;
      border: 3px solid #ff4444;
      background: rgba(0,0,0,0.86);
      box-shadow:
        0 0 30px rgba(255,0,0,0.35),
        inset 0 0 40px rgba(255,0,0,0.12);
      padding: 18px;
      position: relative;
      z-index: 2;
    }

    .topBar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,68,68,0.5);
      padding-bottom: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .warning {
      color: #ffee66;
      margin-bottom: 14px;
      font-size: 14px;
      text-align: center;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .videoWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 2px solid #ff4444;
      background: #000;
      box-shadow: 0 0 22px rgba(255,0,0,0.25);
      overflow: hidden;
    }

    .videoWrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .bottomText {
      margin-top: 16px;
      color: #ffaaaa;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    .buttonRow {
      text-align: center;
      margin-top: 18px;
    }

    a {
      display: inline-block;
      color: #ffee66;
      border: 2px solid #ff4444;
      padding: 12px 16px;
      text-decoration: none;
      background: rgba(255,0,0,0.12);
      font-weight: bold;
    }

    a:hover {
      background: rgba(255,0,0,0.25);
    }

    @media (max-width: 700px) {
      .topBar {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main class="screen">
    <div class="topBar">
      <span>CLASSIFIED TRANSMISSION</span>
      <span>STATUS: DECRYPTED</span>
      <span>#JasonIsAlive</span>
    </div>

    <div class="warning">
      INCOMING VIDEO SIGNAL // PLAYBACK UNLOCKED
    </div>

    <div class="videoWrap">
      <iframe
        src="https://proceon-my.sharepoint.com/personal/j_vanmaarseveen_proceon_nl/_layouts/15/embed.aspx?UniqueId=c0ec4679-578f-4e3b-bbde-a7c9a9d428da&embed=%7B%22af%22%3Atrue%2C%22hvm%22%3Atrue%2C%22ust%22%3Atrue%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create"
        frameborder="0"
        scrolling="no"
        allowfullscreen
        title="JasonKraneisalive.mp4">
      </iframe>
    </div>

    <div class="bottomText">
      Transmission source unknown.<br>
      Identity confirmation pending.
    </div>

    <div class="buttonRow">
      <a href="terminal.html">OPEN RECOVERED DEVICE LINK</a>
    </div>
  </main>
</body>
</html>
