<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Classified Video</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle, #1b1b1b 0%, #050505 70%);
      color: #e6e6e6;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      padding: 20px;
      box-sizing: border-box;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.035),
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 4px
        );
      pointer-events: none;
      animation: flicker 0.2s infinite;
      z-index: 1;
    }

    @keyframes flicker {
      0% { opacity: 0.18; }
      50% { opacity: 0.42; }
      100% { opacity: 0.22; }
    }

    .screen {
      width: 100%;
      max-width: 820px;
      padding: 28px;
      border: 2px solid #5f0000;
      background: rgba(5, 5, 5, 0.92);
      box-shadow: 0 0 40px rgba(150, 0, 0, 0.65);
      text-align: center;
      position: relative;
      z-index: 2;
      box-sizing: border-box;
    }

    .label {
      color: #999;
      letter-spacing: 4px;
      font-size: 14px;
      margin-bottom: 25px;
    }

    h1 {
      color: #ff3333;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 25px;
    }

    .videoBox {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      background: #000;
      border: 1px solid #5f0000;
      box-shadow: 0 0 25px rgba(150, 0, 0, 0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    .videoWrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .videoWrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .button {
      display: inline-block;
      padding: 18px 26px;
      background: #5f0000;
      color: white;
      text-decoration: none;
      border: 1px solid #8b0000;
      box-shadow: 0 0 25px rgba(150, 0, 0, 0.7);
      font-size: 18px;
      letter-spacing: 2px;
      margin-top: 25px;
      cursor: pointer;
      font-family: "Courier New", monospace;
    }

    .button:hover {
      background: #8b0000;
    }

    .note {
      color: #999;
      font-size: 14px;
      margin-top: 18px;
      line-height: 1.5;
    }

    .fallbackLink {
      color: #ff5555;
    }

    @media (max-width: 500px) {
      .screen {
        padding: 20px;
      }

      h1 {
        font-size: 22px;
      }

      .button {
        font-size: 15px;
        padding: 16px 20px;
      }
    }
  </style>
</head>

<body>

  <main class="screen">
    <div class="label">CLASSIFIED VIDEO FILE</div>

    <h1>TRANSMISSION 001 // RECOVERED</h1>

    <div class="videoBox">
      <div class="videoWrapper">
        <iframe
          src="https://proceon-my.sharepoint.com/personal/j_vanmaarseveen_proceon_nl/_layouts/15/embed.aspx?UniqueId=f14e62b3-cd3c-4ee1-9e23-040c757d771b&embed=%7B%22af%22%3Atrue%2C%22hvm%22%3Atrue%2C%22ust%22%3Atrue%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create"
          title="Classified transmission"
          allow="autoplay; fullscreen"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <a class="button" href="terminal.html">OPEN DATA RECOVERY TERMINAL</a>

    <p class="note">
      Als het filmpje niet in de site laadt, gebruik dan de noodlink:<br>
      <a
        class="fallbackLink"
        href="https://proceon-my.sharepoint.com/personal/j_vanmaarseveen_proceon_nl/_layouts/15/embed.aspx?UniqueId=f14e62b3-cd3c-4ee1-9e23-040c757d771b&embed=%7B%22af%22%3Atrue%2C%22hvm%22%3Atrue%2C%22ust%22%3Atrue%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create"
        target="_blank"
        rel="noopener noreferrer">
        open video in nieuw tabblad
      </a>
    </p>
  </main>

</body>
</html>
