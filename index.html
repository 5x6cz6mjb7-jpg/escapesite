<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Transmission Locked</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle, #1b1b1b 0%, #050505 70%);
      color: #e6e6e6;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      padding: 20px;
      box-sizing: border-box;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.035),
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 4px
        );
      pointer-events: none;
      animation: flicker 0.2s infinite;
      z-index: 1;
    }

    @keyframes flicker {
      0% { opacity: 0.18; }
      50% { opacity: 0.42; }
      100% { opacity: 0.22; }
    }

    .screen {
      width: 100%;
      max-width: 760px;
      padding: 28px;
      border: 2px solid #5f0000;
      background: rgba(5, 5, 5, 0.9);
      box-shadow: 0 0 40px rgba(150, 0, 0, 0.65);
      text-align: center;
      position: relative;
      z-index: 2;
      box-sizing: border-box;
    }

    .label {
      color: #999;
      letter-spacing: 4px;
      font-size: 14px;
      margin-bottom: 25px;
    }

    h1 {
      color: #d60000;
      font-size: 42px;
      margin: 10px 0;
      text-shadow: 0 0 12px rgba(255, 0, 0, 0.8);
      animation: glitch 1.8s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-1px, 1px); }
      40% { transform: translate(1px, -1px); }
      60% { transform: translate(-1px, 0); }
      80% { transform: translate(1px, 1px); }
      100% { transform: translate(0); }
    }

    .hashtag {
      color: #ff3333;
      font-size: 24px;
      margin-bottom: 35px;
      text-shadow: 0 0 8px rgba(255, 0, 0, 0.7);
    }

    .countdown-title {
      color: #aaa;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #countdown {
      font-size: 38px;
      color: #f2f2f2;
      padding: 18px;
      border: 1px solid #5f0000;
      background: #080808;
      margin-bottom: 25px;
      box-shadow: inset 0 0 18px rgba(120, 0, 0, 0.5);
    }

    #lockedMessage {
      color: #bdbdbd;
      line-height: 1.5;
    }

    #videoArea {
      display: none;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #5f0000;
    }

    #videoArea h2 {
      color: #ff3333;
      letter-spacing: 2px;
      margin-bottom: 18px;
      font-size: 22px;
    }

    .classifiedButton {
      display: inline-block;
      padding: 18px 26px;
      background: #5f0000;
      color: white;
      text-decoration: none;
      border: 1px solid #8b0000;
      box-shadow: 0 0 25px rgba(150, 0, 0, 0.7);
      font-size: 18px;
      letter-spacing: 2px;
      margin-top: 15px;
      cursor: pointer;
      font-family: "Courier New", monospace;
    }

    .classifiedButton:hover {
      background: #8b0000;
    }

    #videoPlayerArea {
      display: none;
      margin-top: 25px;
    }

    .videoBox {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      background: #000;
      border: 1px solid #5f0000;
      box-shadow: 0 0 25px rgba(150, 0, 0, 0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    .videoWrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .videoWrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      background: #030303;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #startOverlay button {
      font-family: "Courier New", monospace;
      font-size: 22px;
      padding: 18px 28px;
      background: #5f0000;
      color: white;
      border: 1px solid #8b0000;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(150, 0, 0, 0.7);
      letter-spacing: 2px;
    }

    #startOverlay button:hover {
      background: #8b0000;
    }

    .warning {
      color: #777;
      font-size: 13px;
      margin-top: 18px;
    }

    .videoNote {
      color: #999;
      font-size: 14px;
      margin-top: 18px;
      line-height: 1.5;
    }

    .fallbackLink {
      color: #ff5555;
    }

    @media (max-width: 500px) {
      .screen {
        padding: 20px;
      }

      h1 {
        font-size: 32px;
      }

      .hashtag {
        font-size: 20px;
      }

      #countdown {
        font-size: 30px;
      }

      .classifiedButton {
        font-size: 15px;
        padding: 16px 20px;
      }
    }
  </style>
</head>

<body>

  <div id="startOverlay">
    <button onclick="openTransmission()">OPEN TRANSMISSION</button>
  </div>

  <audio id="music" loop>
    <source src="suspense.mp3" type="audio/mpeg">
  </audio>

  <main class="screen">
    <div class="label">ENCRYPTED TRANSMISSION</div>

    <section id="lockedArea">
      <h1>Did you mis me?</h1>
      <div class="hashtag">#Jasonisalife</div>

      <div class="countdown-title">TRANSMISSION UNLOCKS IN</div>
      <div id="countdown">00:00:30</div>

      <p id="lockedMessage">
        The system is locked.<br>
        A message is waiting.
      </p>

      <p class="warning">
        Do not close this transmission.
      </p>
    </section>

    <section id="videoArea">
      <h2>TRANSMISSION UNLOCKED</h2>

      <button class="classifiedButton" onclick="loadVideo()">
        LOAD CLASSIFIED VIDEO
      </button>

      <div id="videoPlayerArea">
        <div class="videoBox">
          <div class="videoWrapper">
            <iframe
              id="videoFrame"
              src=""
              title="Classified transmission"
              allow="autoplay; fullscreen"
              allowfullscreen>
            </iframe>
          </div>
        </div>
      </div>

      <p class="videoNote">
        Als het filmpje niet in de site laadt, gebruik dan de noodlink:<br>
        <a
          class="fallbackLink"
          href="https://proceon-my.sharepoint.com/personal/j_vanmaarseveen_proceon_nl/_layouts/15/embed.aspx?UniqueId=f14e62b3-cd3c-4ee1-9e23-040c757d771b&embed=%7B%22af%22%3Atrue%2C%22hvm%22%3Atrue%2C%22ust%22%3Atrue%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create"
          target="_blank"
          rel="noopener noreferrer">
          open video in nieuw tabblad
        </a>
      </p>
    </section>
  </main>

  <script>
    const countdownSeconds = 30;
    let remainingSeconds = countdownSeconds;
    let countdownInterval;
    let unlocked = false;
    let videoLoaded = false;

    const videoEmbedLink = "https://proceon-my.sharepoint.com/personal/j_vanmaarseveen_proceon_nl/_layouts/15/embed.aspx?UniqueId=f14e62b3-cd3c-4ee1-9e23-040c757d771b&embed=%7B%22af%22%3Atrue%2C%22hvm%22%3Atrue%2C%22ust%22%3Atrue%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create";

    function openTransmission() {
      document.getElementById("startOverlay").style.display = "none";

      const music = document.getElementById("music");
      music.volume = 0.45;

      music.play().catch(function() {
        console.log("Music could not start automatically.");
      });

      updateCountdownDisplay();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    function updateCountdown() {
      remainingSeconds--;

      if (remainingSeconds <= 0) {
        remainingSeconds = 0;
        updateCountdownDisplay();
        clearInterval(countdownInterval);
        unlockVideoButton();
        return;
      }

      updateCountdownDisplay();
    }

    function updateCountdownDisplay() {
      const hours = Math.floor(remainingSeconds / 3600);
      const minutes = Math.floor((remainingSeconds % 3600) / 60);
      const seconds = remainingSeconds % 60;

      document.getElementById("countdown").textContent =
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");
    }

    function unlockVideoButton() {
      if (unlocked) {
        return;
      }

      unlocked = true;

      const music = document.getElementById("music");
      music.pause();
      music.currentTime = 0;

      document.getElementById("lockedArea").style.display = "none";
      document.getElementById("videoArea").style.display = "block";
    }

    function loadVideo() {
      if (videoLoaded) {
        return;
      }

      videoLoaded = true;

      document.getElementById("videoPlayerArea").style.display = "block";
      document.getElementById("videoFrame").src = videoEmbedLink;
    }
  </script>

</body>
</html>
