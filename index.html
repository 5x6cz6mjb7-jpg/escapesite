<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Transmission Locked</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle, #1b1b1b 0%, #050505 70%);
      color: #e6e6e6;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px,
          transparent 4px
        );
      pointer-events: none;
      animation: flicker 0.18s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.25; }
      50% { opacity: 0.45; }
      100% { opacity: 0.2; }
    }

    .screen {
      width: 90%;
      max-width: 760px;
      padding: 35px;
      border: 2px solid #5f0000;
      background: rgba(5, 5, 5, 0.88);
      box-shadow: 0 0 35px rgba(150, 0, 0, 0.65);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .label {
      color: #999;
      letter-spacing: 4px;
      font-size: 14px;
      margin-bottom: 25px;
    }

    h1 {
      color: #d60000;
      font-size: 46px;
      margin: 10px 0;
      text-shadow: 0 0 12px rgba(255, 0, 0, 0.8);
      animation: glitch 1.8s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-1px, 1px); }
      40% { transform: translate(1px, -1px); }
      60% { transform: translate(-1px, 0); }
      80% { transform: translate(1px, 1px); }
      100% { transform: translate(0); }
    }

    .hashtag {
      color: #ff3333;
      font-size: 24px;
      margin-bottom: 35px;
    }

    .countdown-title {
      color: #aaa;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #countdown {
      font-size: 42px;
      color: #f2f2f2;
      padding: 18px;
      border: 1px solid #5f0000;
      background: #080808;
      margin-bottom: 25px;
    }

    #lockedMessage {
      color: #bdbdbd;
      line-height: 1.5;
    }

    #accessArea {
      display: none;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid #5f0000;
    }

    input {
      padding: 12px;
      width: 70%;
      max-width: 300px;
      background: #000;
      color: #eee;
      border: 1px solid #800000;
      font-size: 18px;
      text-align: center;
      text-transform: uppercase;
      font-family: inherit;
    }

    button {
      padding: 12px 18px;
      margin-top: 15px;
      background: #5f0000;
      color: white;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
    }

    button:hover {
      background: #8b0000;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      background: #030303;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #startOverlay button {
      font-size: 22px;
      padding: 18px 28px;
      border: 1px solid #8b0000;
      box-shadow: 0 0 25px rgba(150, 0, 0, 0.7);
    }

    #message {
      min-height: 24px;
      margin-top: 15px;
      color: #ff4444;
    }
  </style>
</head>
<body>

  <div id="startOverlay">
    <button onclick="openTransmission()">Open transmission</button>
  </div>

  <audio id="music" loop>
    <source src="suspense.mp3" type="audio/mpeg">
  </audio>

  <main class="screen">
    <div class="label">ENCRYPTED TRANSMISSION</div>

    <h1>Did you mis me?</h1>
    <div class="hashtag">#JasonKraneisalive</div>

    <div class="countdown-title">ACCESS AVAILABLE IN</div>
    <div id="countdown">--:--:--:--</div>

    <p id="lockedMessage">
      The system is locked.<br>
      Code access will become available on 3 July 2026.
    </p>

    <section id="accessArea">
      <p>Enter access code:</p>
      <input id="codeInput" type="text" placeholder="CODE">
      <br>
      <button onclick="checkCode()">Unlock</button>
      <p id="message"></p>
    </section>
  </main>

  <script>
    const unlockDate = new Date("2026-07-03T00:00:00+02:00");

    function openTransmission() {
      document.getElementById("startOverlay").style.display = "none";

      const music = document.getElementById("music");
      music.volume = 0.45;
      music.play().catch(function() {
        console.log("Music could not start.");
      });
    }

    function updateCountdown() {
      const now = new Date();
      const difference = unlockDate - now;

      if (difference <= 0) {
        document.getElementById("countdown").textContent = "00:00:00:00";
        document.getElementById("lockedMessage").style.display = "none";
        document.getElementById("accessArea").style.display = "block";
        return;
      }

      const totalSeconds = Math.floor(difference / 1000);

      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("countdown").textContent =
        String(days).padStart(2, "0") + ":" +
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");
    }

    function checkCode() {
      const code = document.getElementById("codeInput").value.trim().toUpperCase();
      const message = document.getElementById("message");

      if (code === "TEST") {
        message.textContent = "ACCESS GRANTED";
      } else {
        message.textContent = "ACCESS DENIED";
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
