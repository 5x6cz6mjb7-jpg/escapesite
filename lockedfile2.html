<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>MI6 Locked File</title>

  <style>
    :root {
      --green: #00ff66;
      --softGreen: #00aa44;
      --dark: #001100;
      --panel: #031403;
      --text: #baffc9;
      --yellow: #ffee66;
      --red: #ff5555;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at center, #062006 0%, #020902 62%, #000 100%);
      color: var(--green);
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 100, 0.06),
          rgba(0, 255, 100, 0.06) 1px,
          transparent 1px,
          transparent 4px
        );
      z-index: 1;
    }

    .computer {
      width: 100%;
      max-width: 1100px;
      background: #0c140c;
      border: 3px solid #244524;
      border-radius: 16px;
      padding: 18px 18px 26px;
      box-shadow:
        0 0 0 3px #050805,
        0 18px 45px rgba(0, 0, 0, 0.65);
      position: relative;
      z-index: 2;
    }

    .monitorHeader {
      color: #9fc29f;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .screen {
      background:
        radial-gradient(circle at center, rgba(0, 255, 100, 0.08), transparent 52%),
        linear-gradient(180deg, #041104 0%, #020c02 100%);
      border: 4px solid #1d391d;
      border-radius: 10px;
      padding: 14px;
      min-height: 700px;
      box-shadow:
        inset 0 0 35px rgba(0, 255, 100, 0.08),
        inset 0 0 90px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .topBar {
      height: 34px;
      border: 2px solid var(--softGreen);
      background: linear-gradient(180deg, #0c320c, #061b06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      margin-bottom: 14px;
      color: var(--text);
      font-size: 13px;
    }

    .signalDot {
      width: 9px;
      height: 9px;
      background: var(--green);
      border: 1px solid #d8ffe6;
      box-shadow: 0 0 8px rgba(0, 255, 100, 0.7);
      display: inline-block;
      margin-right: 8px;
    }

    .window {
      border: 2px solid var(--softGreen);
      background: var(--panel);
      box-shadow:
        0 0 16px rgba(0, 255, 100, 0.12),
        inset 0 0 22px rgba(0, 255, 100, 0.05);
    }

    .windowTitle {
      background: linear-gradient(180deg, #0c360c, #071d07);
      border-bottom: 2px solid var(--softGreen);
      padding: 8px 10px;
      color: #e9ffef;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .windowButtons {
      display: flex;
      gap: 6px;
    }

    .winBtn {
      width: 16px;
      height: 16px;
      border: 1px solid #d8ffe6;
      background: #0c2d0c;
    }

    .windowBody {
      padding: 18px;
    }

    h1 {
      margin: 0 0 12px;
      color: var(--green);
      font-size: 24px;
      text-shadow: 0 0 8px rgba(0, 255, 100, 0.75);
      letter-spacing: 1px;
    }

    .intro {
      border: 1px dashed var(--softGreen);
      background: rgba(0, 255, 100, 0.04);
      padding: 12px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 16px;
      white-space: pre-line;
    }

    .accessGrid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .accessBox {
      border: 1px dashed rgba(0, 255, 100, 0.35);
      background: rgba(0, 0, 0, 0.22);
      padding: 12px;
      min-height: 150px;
    }

    .accessTitle {
      color: var(--yellow);
      font-size: 14px;
      margin-bottom: 10px;
    }

    label {
      display: block;
      color: var(--text);
      font-size: 13px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #000;
      color: var(--green);
      border: 1px solid var(--softGreen);
      padding: 11px;
      font-family: "Courier New", monospace;
      font-size: 15px;
      text-transform: uppercase;
      outline: none;
      margin-bottom: 10px;
    }

    input::placeholder {
      color: #2f7b45;
    }

    input:focus {
      box-shadow: 0 0 10px rgba(0, 255, 100, 0.35);
    }

    input.correct {
      background: #012e12;
      border-color: var(--green);
      color: #d9ffe6;
    }

    input.wrong {
      background: #260000;
      border-color: var(--red);
      color: #ffb0b0;
    }

    button,
    .buttonLink {
      display: inline-block;
      background: linear-gradient(180deg, #0f4b1f, #093112);
      color: var(--green);
      border: 1px solid var(--green);
      padding: 11px 14px;
      font-family: "Courier New", monospace;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    button:hover,
    .buttonLink:hover {
      background: linear-gradient(180deg, #146428, #0b3a15);
    }

    button:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .miniStatus {
      min-height: 18px;
      font-size: 12px;
      margin-top: 8px;
    }

    .ok {
      color: var(--green);
    }

    .bad {
      color: var(--red);
    }

    #mainMessage {
      min-height: 24px;
      color: var(--red);
      margin: 14px 0;
      line-height: 1.5;
    }

    #fileContent {
      display: none;
      border: 1px solid var(--green);
      background: rgba(0, 255, 100, 0.05);
      padding: 16px;
      color: var(--text);
      line-height: 1.7;
      box-shadow: 0 0 14px rgba(0, 255, 100, 0.2);
      margin-top: 16px;
    }

    .fileTitle {
      color: var(--yellow);
      font-size: 18px;
      margin-bottom: 10px;
      text-shadow: 0 0 8px rgba(255, 238, 102, 0.45);
    }

    .videoBox {
      border: 1px dashed var(--softGreen);
      background: rgba(0, 0, 0, 0.45);
      padding: 18px;
      margin-top: 14px;
      color: #9dffbd;
      text-align: center;
      min-height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      white-space: pre-line;
    }

    .glitch {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.04),
          rgba(255,255,255,0.04) 2px,
          transparent 2px,
          transparent 8px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(0,255,100,0.08),
          rgba(0,255,100,0.08) 3px,
          transparent 3px,
          transparent 11px
        );
      animation: flash 0.12s infinite;
    }

    .glitch::before {
      content: "LOCKED FILE OPENED";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      color: var(--yellow);
      background: rgba(0, 20, 0, 0.95);
      border: 2px solid var(--yellow);
      padding: 18px 24px;
      font-size: 24px;
      letter-spacing: 2px;
      text-align: center;
      box-shadow: 0 0 24px rgba(255, 238, 102, 0.35);
    }

    @keyframes flash {
      0% { opacity: 0.35; }
      50% { opacity: 0.85; }
      100% { opacity: 0.45; }
    }

    .bottomButtons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .accessGrid {
        grid-template-columns: 1fr;
      }

      .screen {
        min-height: auto;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 19px;
      }

      .windowBody {
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="glitch" id="glitch"></div>

  <div class="computer">
    <div class="monitorHeader">MI6 Secure Computer Terminal // Locked File Access</div>

    <div class="screen">
      <div class="topBar">
        <div>
          <span class="signalDot"></span>
          <span id="topFileName">LOCKED FILE</span>
        </div>
        <div>STATUS: ENCRYPTED</div>
      </div>

      <section class="window">
        <div class="windowTitle">
          <span id="windowTitle">Locked File Access</span>
          <div class="windowButtons">
            <span class="winBtn"></span>
            <span class="winBtn"></span>
            <span class="winBtn"></span>
          </div>
        </div>

        <div class="windowBody">
          <h1 id="pageTitle">LOCKED FILE</h1>

          <div class="intro" id="introText"></div>

          <div class="accessGrid">
            <div class="accessBox">
              <div class="accessTitle">PASSWORD A</div>
              <label for="passwordA">Enter first password:</label>
              <input id="passwordA" type="text" placeholder="PASSWORD A">
              <button id="buttonA" onclick="checkPasswordA()">CHECK</button>
              <div id="statusA" class="miniStatus"></div>
            </div>

            <div class="accessBox">
              <div class="accessTitle">PASSWORD B</div>
              <label for="passwordB">Enter second password:</label>
              <input id="passwordB" type="text" placeholder="PASSWORD B">
              <button id="buttonB" onclick="checkPasswordB()">CHECK</button>
              <div id="statusB" class="miniStatus"></div>
            </div>

            <div class="accessBox">
              <div class="accessTitle">MINIGAME REQUIRED</div>
              <label id="gameLabel">Complete required game:</label>
              <a id="gameLink" class="buttonLink" href="#">OPEN GAME</a>
              <br><br>
              <label for="gameCode">Enter game code:</label>
              <input id="gameCode" type="text" placeholder="GAME CODE">
              <button id="buttonGame" onclick="checkGameCode()">CHECK</button>
              <div id="statusGame" class="miniStatus"></div>
            </div>
          </div>

          <div id="mainMessage">
            File remains encrypted.
          </div>

          <div id="fileContent">
            <div class="fileTitle" id="fileContentTitle"></div>
            <div id="fileStory"></div>
            <div class="videoBox" id="videoBox"></div>
          </div>

          <div class="bottomButtons">
            <a class="buttonLink" href="terminal.html">RETURN TO DESKTOP</a>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const fileConfigs = {
      "lockedfile1.html": {
        title: "LOCKED FILE 1",
        subtitle: "BOTANICAL CONTAINMENT FILE",
        intro: "This file is protected by two archive passwords and one external simulation result. Complete the Snake protocol to recover the required minigame code.",
        passwordA: "KRANE",
        passwordB: "GARDEN",
        gameCode: "NIGHTSHADE",
        gameName: "SNAKE PROTOCOL",
        gameUrl: "snake.html",
        contentTitle: "RECOVERED FILE 1 // AUDIO TRACE",
        story: "Recovered clip analysis:\n\nKrane's voice pattern does not match the original MI6 archive.\nThe transmission was staged.\nSomeone is using his identity to reopen old files.\n\nNote recovered from botanical archive:\n\"The garden remembers what the dead cannot say.\"",
        video: "VIDEO / CLUE PLACEHOLDER\nYou can later place a video here.\nFor now, this file reveals that the Jason Krane messages may be fake."
      },

      "lockedfile2.html": {
        title: "LOCKED FILE 2",
        subtitle: "PIXEL STACK ARCHIVE",
        intro: "This file is protected by two archive passwords and one external simulation result. Complete the Pixel Stack protocol to recover the required minigame code.",
        passwordA: "VOSS",
        passwordB: "BOTANY",
        gameCode: "ROZENBOTTEL",
        gameName: "PIXEL STACK PROTOCOL",
        gameUrl: "tetris.html",
        contentTitle: "RECOVERED FILE 2 // UNIVERSITY RECORD",
        story: "Recovered university archive:\n\nDr. A. Voss worked in botanical biology.\nHer research access remained active after her official departure.\nA midnight login was recorded under a sealed department account.\n\nArchive note:\n\"Specimens were moved. Labels were changed. Someone knew the greenhouse system.\"",
        video: "EVIDENCE PLACEHOLDER\nThis clue points toward Dr. A. Voss and the botanical archive."
      },

      "lockedfile3.html": {
        title: "LOCKED FILE 3",
        subtitle: "TOP-DOWN LAB REPORT",
        intro: "This file is protected by two archive passwords and one external simulation result. Complete the Top-Down Lab protocol to recover the required minigame code.",
        passwordA: "LOVER",
        passwordB: "POISON",
        gameCode: "EYESONLY",
        gameName: "TOP-DOWN LAB PROTOCOL",
        gameUrl: "shoot.html",
        contentTitle: "RECOVERED FILE 3 // PRIVATE CORRESPONDENCE",
        story: "Private correspondence recovered:\n\nKrane and Voss were connected outside official records.\nThe relationship was hidden from MI6.\nThe attacks are not random.\nThey are personal.\n\nRecovered line:\n\"They left him buried in files. I will make them read every page.\"",
        video: "CLUE PLACEHOLDER\nThis file reveals that the case is emotional revenge, not just a security breach."
      },

      "lockedfile4.html": {
        title: "LOCKED FILE 4",
        subtitle: "FINAL MEMORY RECORD",
        intro: "This final file is protected by two archive passwords and one external simulation result. Complete the Memory protocol to recover the final minigame code.",
        passwordA: "DEAD",
        passwordB: "REVENGE",
        gameCode: "GOLDENEYE",
        gameName: "MEMORY PROTOCOL",
        gameUrl: "memory.html",
        contentTitle: "RECOVERED FILE 4 // FINAL REVEAL",
        story: "Jason Krane is dead.\nHe has been dead for over a year.\n\nThe messages were not sent by him.\nThey were staged.\n\nThe sender is Dr. A. Voss.\nFormer biology lecturer.\nBotanical specialist.\nKrane's hidden lover.\n\nShe does not want Bond dead first.\nShe wants M and Q to suffer.\n\nFinal instruction:\nFind the diary.",
        video: "FINAL CLUE PLACEHOLDER\nThis is the ontknoping.\nReplace this block later with the final video or final diary clue."
      }
    };

    let currentConfig;
    let solvedA = false;
    let solvedB = false;
    let solvedGame = false;

    function getCurrentConfig() {
      const fileName = window.location.pathname.split("/").pop().toLowerCase();
      return fileConfigs[fileName] || fileConfigs["lockedfile1.html"];
    }

    function clean(value) {
      return value.trim().toUpperCase().replace(/\s+/g, "");
    }

    function setupPage() {
      currentConfig = getCurrentConfig();

      document.title = currentConfig.title + " // MI6";
      document.getElementById("topFileName").textContent = currentConfig.title + " // " + currentConfig.subtitle;
      document.getElementById("windowTitle").textContent = currentConfig.title + " Access Console";
      document.getElementById("pageTitle").textContent = currentConfig.title;
      document.getElementById("introText").textContent = currentConfig.intro;
      document.getElementById("gameLabel").textContent = "Complete required game: " + currentConfig.gameName;
      document.getElementById("gameLink").href = currentConfig.gameUrl;
      document.getElementById("gameLink").textContent = "OPEN " + currentConfig.gameName;
      document.getElementById("fileContentTitle").textContent = currentConfig.contentTitle;
      document.getElementById("fileStory").textContent = currentConfig.story;
      document.getElementById("videoBox").textContent = currentConfig.video;
    }

    function checkPasswordA() {
      const input = document.getElementById("passwordA");
      const button = document.getElementById("buttonA");
      const status = document.getElementById("statusA");

      if (clean(input.value) === currentConfig.passwordA) {
        solvedA = true;
        input.classList.remove("wrong");
        input.classList.add("correct");
        input.disabled = true;
        button.disabled = true;
        button.textContent = "LOCKED";
        status.textContent = "PASSWORD A ACCEPTED";
        status.className = "miniStatus ok";
        checkComplete();
      } else {
        input.classList.remove("correct");
        input.classList.add("wrong");
        status.textContent = "PASSWORD A REJECTED";
        status.className = "miniStatus bad";
        showMessage("PASSWORD A REJECTED // Try again.", false);
      }
    }

    function checkPasswordB() {
      const input = document.getElementById("passwordB");
      const button = document.getElementById("buttonB");
      const status = document.getElementById("statusB");

      if (clean(input.value) === currentConfig.passwordB) {
        solvedB = true;
        input.classList.remove("wrong");
        input.classList.add("correct");
        input.disabled = true;
        button.disabled = true;
        button.textContent = "LOCKED";
        status.textContent = "PASSWORD B ACCEPTED";
        status.className = "miniStatus ok";
        checkComplete();
      } else {
        input.classList.remove("correct");
        input.classList.add("wrong");
        status.textContent = "PASSWORD B REJECTED";
        status.className = "miniStatus bad";
        showMessage("PASSWORD B REJECTED // Try again.", false);
      }
    }

    function checkGameCode() {
      const input = document.getElementById("gameCode");
      const button = document.getElementById("buttonGame");
      const status = document.getElementById("statusGame");

      if (clean(input.value) === currentConfig.gameCode) {
        solvedGame = true;
        input.classList.remove("wrong");
        input.classList.add("correct");
        input.disabled = true;
        button.disabled = true;
        button.textContent = "LOCKED";
        status.textContent = "MINIGAME CODE ACCEPTED";
        status.className = "miniStatus ok";
        checkComplete();
      } else {
        input.classList.remove("correct");
        input.classList.add("wrong");
        status.textContent = "MINIGAME CODE REJECTED";
        status.className = "miniStatus bad";
        showMessage("MINIGAME CODE REJECTED // Complete the required game.", false);
      }
    }

    function showMessage(text, positive) {
      const message = document.getElementById("mainMessage");
      message.textContent = text;
      message.style.color = positive ? "#00ff66" : "#ff5555";
    }

    function checkComplete() {
      if (solvedA && solvedB && solvedGame) {
        showMessage("ACCESS GRANTED // LOCKED FILE DECRYPTED.", true);

        const glitch = document.getElementById("glitch");
        glitch.style.display = "block";

        setTimeout(function() {
          glitch.style.display = "none";
          document.getElementById("fileContent").style.display = "block";
          document.getElementById("fileContent").scrollIntoView({ behavior: "smooth" });
        }, 1800);
      } else {
        showMessage("PARTIAL ACCESS CONFIRMED // Remaining locks still active.", true);
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        const active = document.activeElement;

        if (active.id === "passwordA") {
          checkPasswordA();
        }

        if (active.id === "passwordB") {
          checkPasswordB();
        }

        if (active.id === "gameCode") {
          checkGameCode();
        }
      }
    });

    setupPage();
  </script>

</body>
</html>
